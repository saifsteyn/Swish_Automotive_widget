<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Swish Automotive — Service Estimator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f0f2f5; --white: #ffffff; --surface: #f7f8fa;
    --border: #e4e7ec; --border-focus: #1a1a2e;
    --text-primary: #111827; --text-secondary: #6b7280; --text-muted: #9ca3af;
    --accent: #1a1a2e; --accent-hover: #2d2d4e;
    --radius-lg: 16px; --radius-md: 10px; --radius-sm: 7px;
    --shadow-card: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.06);
  }
  body {
    background: var(--bg); color: var(--text-primary);
    font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
    min-height: 100vh; display: flex; align-items: flex-start;
    justify-content: center; padding: 40px 20px;
  }
  .widget { width: 100%; max-width: 520px; }
  .header { margin-bottom: 24px; }
  .brand-row { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
  .brand-icon {
    width: 36px; height: 36px; background: var(--accent);
    border-radius: 9px; display: flex; align-items: center;
    justify-content: center; font-size: 16px; flex-shrink: 0;
  }
  .brand-name { font-size: 15px; font-weight: 700; color: var(--text-primary); }
  .brand-tag  { font-size: 11px; font-weight: 500; color: var(--text-muted); margin-top: 1px; }
  .page-title { font-size: 26px; font-weight: 700; color: var(--text-primary); letter-spacing: -0.02em; line-height: 1.15; margin-bottom: 6px; }
  .page-sub   { font-size: 13.5px; color: var(--text-secondary); }
  .card {
    background: var(--white); border-radius: var(--radius-lg);
    border: 1px solid var(--border); box-shadow: var(--shadow-card); overflow: hidden;
  }
  .card-section { padding: 24px; border-bottom: 1px solid var(--border); }
  .card-section:last-child { border-bottom: none; }
  .section-label { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 14px; }

  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
  @keyframes spin  { to { transform: rotate(360deg); } }

  /* Form */
  .field-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .field-group.three-col { grid-template-columns: 1fr 1fr 90px; }
  .field-group.full { grid-template-columns: 1fr; margin-bottom: 0; }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-size: 12px; font-weight: 600; color: var(--text-secondary); }
  .select-wrap { position: relative; }
  select {
    width: 100%; background: var(--surface); border: 1.5px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text-primary);
    font-family: 'Plus Jakarta Sans', sans-serif; font-size: 13.5px; font-weight: 500;
    padding: 10px 34px 10px 12px; outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
    appearance: none; -webkit-appearance: none; cursor: pointer; line-height: 1.4;
  }
  select:focus { border-color: var(--border-focus); background: #fff; box-shadow: 0 0 0 3px rgba(26,26,46,0.08); }
  select:hover:not(:disabled) { border-color: #c4c9d4; background: #fff; }
  select:disabled { opacity: 0.45; cursor: not-allowed; }
  .select-arrow { position: absolute; right: 11px; top: 50%; transform: translateY(-50%); pointer-events: none; color: var(--text-muted); }

  /* Result */
  .result-empty { padding: 32px 24px; text-align: center; }
  .empty-icon {
    width: 44px; height: 44px; background: var(--surface); border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; margin: 0 auto 12px; border: 1px solid var(--border);
  }
  .empty-title { font-size: 14px; font-weight: 600; color: var(--text-secondary); margin-bottom: 4px; }
  .empty-sub   { font-size: 12.5px; color: var(--text-muted); line-height: 1.5; }
  .estimate-box { padding: 24px; display: none; }
  .estimate-box.show { display: block; }
  .estimate-vehicle {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--border);
  }
  .vehicle-icon {
    width: 38px; height: 38px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 17px; flex-shrink: 0;
  }
  .vehicle-name    { font-size: 14px; font-weight: 700; color: var(--text-primary); line-height: 1.2; }
  .vehicle-service { font-size: 12.5px; color: var(--text-secondary); margin-top: 2px; }
  .total-display {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-md); padding: 20px; text-align: center; margin-bottom: 16px;
  }
  .total-label      { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; }
  .total-amount     { font-size: 42px; font-weight: 700; color: var(--text-primary); letter-spacing: -0.03em; line-height: 1; }
  .total-range-note { font-size: 12px; color: var(--text-muted); margin-top: 6px; }
  .total-disclaimer { font-size: 11.5px; color: var(--text-muted); text-align: center; line-height: 1.5; margin-bottom: 16px; }
  .note-badge {
    display: inline-flex; align-items: center; gap: 5px;
    background: #fffbeb; border: 1px solid #fde68a; color: #92400e;
    font-size: 11.5px; font-weight: 600; padding: 5px 10px;
    border-radius: 20px; margin-bottom: 14px;
  }
  .btn-book {
    width: 100%; background: var(--accent); color: #fff;
    font-family: 'Plus Jakarta Sans', sans-serif; font-size: 14px; font-weight: 700;
    border: none; border-radius: var(--radius-sm); padding: 13px 20px; cursor: pointer;
    transition: background 0.15s, transform 0.12s, box-shadow 0.15s;
    display: flex; align-items: center; justify-content: center; gap: 7px;
  }
  .btn-book:hover { background: var(--accent-hover); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(26,26,46,0.25); }
  .btn-book:active { transform: translateY(0); box-shadow: none; }
  .footer { margin-top: 16px; text-align: center; font-size: 11.5px; color: var(--text-muted); line-height: 1.7; }
  .footer a { color: var(--text-secondary); text-decoration: underline; text-underline-offset: 2px; }
  @media (max-width: 440px) {
    body { padding: 20px 14px; }
    .field-group, .field-group.three-col { grid-template-columns: 1fr 1fr; }
    .total-amount { font-size: 34px; }
  }
</style>
</head>

// ── Google Sheets CSV URLs (for background refresh) ──────────────────────────
const SHEET_BASE = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSByilUAUROygy13jJMBAMqvUUoaqmZzlnWSVnxMyQnt9JQclXKRtVaxV2csCLPjg/pub?single=true&output=csv';
const GID = { vehicles: '1134338394', services: '1734692706', parts: '1731306997' };

// ── Banner hidden — status logged to console only ────────────────────────────
function setBanner(state, msg) {
  console.log('[Swish] ' + state + ': ' + msg);
}

// ── CSV parser ────────────────────────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.replace(/"/g,'').trim());
  return lines.slice(1).map(line => {
    const cols=[]; let cur='', inQ=false;
    for(let i=0;i<line.length;i++) {
      if(line[i]==='"') inQ=!inQ;
      else if(line[i]===',' && !inQ) { cols.push(cur); cur=''; }
      else cur+=line[i];
    }
    cols.push(cur);
    const row={};
    headers.forEach((h,i) => row[h]=(cols[i]||'').replace(/"/g,'').trim());
    return row;
  }).filter(r => Object.values(r).some(v=>v!==''));
}

// ── Background refresh from Google Sheets ────────────────────────────────────
async function tryRefresh() {
  setBanner('updating', 'Checking Google Sheets for updates...');
  try {
    const proxies = [
      'https://corsproxy.io/?url=',
      'https://api.allorigins.win/raw?url='
    ];

    async function fetchWithProxy(gid) {
      const url = SHEET_BASE + '&gid=' + gid;
      for (const proxy of proxies) {
        try {
          const r = await fetch(proxy + encodeURIComponent(url));
          if (r.ok) return r.text();
        } catch(e) {}
      }
      throw new Error('All proxies failed for gid=' + gid);
    }

    const [vText, sText, pText] = await Promise.all([
      fetchWithProxy(GID.vehicles),
      fetchWithProxy(GID.services),
      fetchWithProxy(GID.parts)
    ]);

    // Update VEHICLES
    const newV = {};
    parseCSV(vText).forEach(row => {
      const make=row['make']||row['Make'], model=row['model']||row['Model'];
      if(!make||!model) return;
      if(!newV[make]) newV[make]=[];
      if(!newV[make].includes(model)) newV[make].push(model);
    });
    if(Object.keys(newV).length > 0) VEHICLES = newV;

    // Update SERVICES
    const newS = [];
    parseCSV(sText).forEach(row => {
      const id=row['service_id'], name=row['service_name'];
      if(!id||!name) return;
      const lm=row['labor_max'];
      newS.push({
        id, name,
        labor_base: parseFloat(row['labor_base']||0),
        labor_max: (!lm||lm===''||lm.toLowerCase()==='nan') ? null : parseFloat(lm),
        swish_fee: parseFloat(row['swish_fee']||100),
        notes: (!row['notes']||row['notes'].toLowerCase()==='nan') ? null : row['notes']
      });
    });
    if(newS.length > 0) SERVICES = newS;

    // Update PARTS
    const newP = {};
    parseCSV(pText).forEach(row => {
      const make=row['make'], model=row['model'], svcId=row['service_id'], cost=row['parts_cost'];
      if(!make||!model||!svcId||!cost||cost==='') return;
      const val=parseFloat(cost);
      if(!isNaN(val)) newP[make+'|'+model+'|'+svcId]=val;
    });
    if(Object.keys(newP).length > 0) PARTS = newP;

    // Rebuild dropdowns with fresh data
    buildUI();
    setBanner('live', 'Live pricing · Updated from Google Sheets ✓');

  } catch(e) {
    // Silently fall back to embedded data — no disruption to user
    setBanner('error', 'Using cached pricing · Could not reach Google Sheets');
    console.warn('Sheet refresh failed:', e.message);
  }
}

// ── Build dropdowns ──────────────────────────────────────────────────────────
function buildUI() {
  const curMake  = document.getElementById('make').value;
  const curModel = document.getElementById('model').value;
  const curSvc   = document.getElementById('service').value;

  const makeEl = document.getElementById('make');
  makeEl.innerHTML = '<option value="">Select make</option>';
  Object.keys(VEHICLES).sort().forEach(make => {
    const o = document.createElement('option');
    o.value = make; o.textContent = make;
    if(make === curMake) o.selected = true;
    makeEl.appendChild(o);
  });

  if(curMake && VEHICLES[curMake]) {
    const modelEl = document.getElementById('model');
    modelEl.innerHTML = '<option value="">Select model</option>';
    VEHICLES[curMake].forEach(m => {
      const o = document.createElement('option');
      o.value = m; o.textContent = m;
      if(m === curModel) o.selected = true;
      modelEl.appendChild(o);
    });
    modelEl.disabled = false;
  }

  const yearEl = document.getElementById('year');
  if(yearEl.options.length <= 1) {
    for(let y=2025;y>=2000;y--) {
      const o=document.createElement('option');
      o.value=y; o.textContent=y;
      yearEl.appendChild(o);
    }
  }

  const svcEl = document.getElementById('service');
  svcEl.innerHTML = '<option value="">Select service</option>';
  SERVICES.forEach(s => {
    const o = document.createElement('option');
    o.value = s.id;
    o.textContent = s.name + (s.notes ? ` (${s.notes})` : '');
    if(s.id === curSvc) o.selected = true;
    svcEl.appendChild(o);
  });

  // Recalculate if all fields were already filled
  if(curMake && curModel && document.getElementById('year').value && curSvc) calculate();
}

function onMakeChange() {
  const make = document.getElementById('make').value;
  const modelEl = document.getElementById('model');
  modelEl.innerHTML = '<option value="">Select model</option>';
  if(make && VEHICLES[make]) {
    VEHICLES[make].forEach(m => {
      const o=document.createElement('option');
      o.value=m; o.textContent=m;
      modelEl.appendChild(o);
    });
    modelEl.disabled = false;
  } else {
    modelEl.disabled = true;
  }
  hideEstimate();
}

function fmt(n) { return '$' + Math.round(n).toLocaleString('en-US'); }

function calculate() {
  const make  = document.getElementById('make').value;
  const model = document.getElementById('model').value;
  const year  = document.getElementById('year').value;
  const svcId = document.getElementById('service').value;
  if(!make||!model||!year||!svcId) { hideEstimate(); return; }

  const svc = SERVICES.find(s => s.id === svcId);
  if(!svc) { hideEstimate(); return; }

  const partsRaw = PARTS[`${make}|${model}|${svcId}`];
  const parts = (partsRaw !== undefined && !isNaN(partsRaw)) ? partsRaw : 0;

  const totalBase = parts + svc.labor_base + svc.swish_fee;
  const totalMax  = svc.labor_max ? parts + svc.labor_max + svc.swish_fee : null;
  showEstimate(make, model, year, svc, totalBase, totalMax);
}

function showEstimate(make, model, year, svc, totalBase, totalMax) {
  document.getElementById('result-empty').style.display = 'none';
  const totalStr  = totalMax ? `${fmt(totalBase)} – ${fmt(totalMax)}` : fmt(totalBase);
  const rangeNote = totalMax ? '<div class="total-range-note">Depending on labor complexity</div>' : '';
  const noteHtml  = svc.notes ? `<div class="note-badge">📌 ${svc.notes}</div>` : '';
  const box = document.getElementById('estimate-box');
  box.innerHTML = `
    <div class="estimate-vehicle">
      <div class="vehicle-icon">🚗</div>
      <div>
        <div class="vehicle-name">${year} ${make} ${model.trim()}</div>
        <div class="vehicle-service">${svc.name}</div>
      </div>
    </div>
    <div class="total-display">
      <div class="total-label">Estimated Total</div>
      <div class="total-amount">${totalStr}</div>
      ${rangeNote}
    </div>
    <div class="total-disclaimer">Includes parts, labor & Swish Automotive fee · No taxes</div>
    ${noteHtml}
    <button class="btn-book" onclick="bookNow()">
      <svg width="15" height="15" fill="none" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" stroke="white" stroke-width="2"/><path d="M16 2v4M8 2v4M3 10h18" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>
      Book This Service
    </button>
  `;
  box.classList.add('show');
}

function hideEstimate() {
  document.getElementById('result-empty').style.display = 'block';
  const box = document.getElementById('estimate-box');
  box.classList.remove('show');
  box.innerHTML = '';
}

function bookNow() {
  alert('Redirecting to booking…\n(Connect this to your Framer booking or Calendly link.)');
}

// ── Init ─────────────────────────────────────────────────────────────────────
buildUI();                      // instant load from embedded data
setTimeout(tryRefresh, 1500);   // try to refresh from Google Sheets after 1.5s
</script>
</body>
